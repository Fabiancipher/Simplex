<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Calculadora Simplex</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <h1>Calculadora Simplex</h1>
    <!--Esto es la tabla que contiene el formulario de envio-->
    <form method="POST" action="/solve">
        <table class="formulario">
            <!--Cantidad de variables y restricciones-->
            <tr>
                <td>
                    Numero de variables: <input type="number" id="numVariables" name="numVariables" value="3" min="1"
                        max="30">
                    Numero de restricciones: <input type="number" id="numRestricciones" name="numRestricciones"
                        value="3" min="1" max="30">
                    <button type="button" id="generarBtn">Generar Tabla</button>
                </td>
            </tr>
            <tr>
                <td>
                    <table class="tablaSimplex">
                        <tbody id="cuerpoTabla" class="cuerpoTabla">
                        </tbody>
                    </table>
                </td>
            </tr>
            <tr>
                <td>
                    <button type="submit">Calcular</button>
                </td>
            </tr>
        </table>
    </form>

    <script src={{url_for('static', filename= 'TablaDinamica.js')}}>
        /**
         * Genera dinámicamente la tabla Simplex con inputs para:
         * - Función objetivo con coeficientes de las variables
         * - Restricciones con coeficientes y operadores
         * 
         */
        
    </script>
</body>

</html>
